[package]
name = "tower-openapi-client"
version = "0.1.0"
edition = "2024"

[dependencies]
http = "1.3.1"
oas3 = { version = "0.19.0", features = ["yaml-spec"] }
# proc-macro2 = "1.0.101"
quote = "1.0.40"
syn = { version = "2.0.106", features = ["full"] }
thiserror = "2.0.16"
serde_json = "1"
proc-macro2 = "1.0.101"
[dev-dependencies]
anyhow = "1.0.99"
tower = "0.5"
tower-http = "0.6"
http = "1"
http-body = { version = "1" }
http-body-util = { version = "0.1.3", features = ["full"] }
bytes = "1"
